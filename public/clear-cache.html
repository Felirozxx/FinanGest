<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>FinanGest - Limpiando Cache</title>
    <style>
        body { background: #0a0e17; color: white; font-family: Arial; text-align: center; padding: 50px; }
        .spinner { border: 4px solid #1a1f2e; border-top: 4px solid #00d4ff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>FinanGest</h1>
    <div class="spinner"></div>
    <p>Limpiando cache y cargando versión actualizada...</p>
    <p id="status">Iniciando...</p>
    
    <script>
        const status = document.getElementById('status');
        
        async function clearEverything() {
            status.textContent = 'Limpiando Service Workers...';
            
            // Limpiar service workers
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let registration of registrations) {
                    await registration.unregister();
                }
            }
            
            status.textContent = 'Limpiando cache del navegador...';
            
            // Limpiar cache
            if ('caches' in window) {
                const cacheNames = await caches.keys();
                for (let cacheName of cacheNames) {
                    await caches.delete(cacheName);
                }
            }
            
            status.textContent = 'Limpiando localStorage...';
            
            // Limpiar storage
            localStorage.clear();
            sessionStorage.clear();
            
            status.textContent = 'Redirigiendo a la aplicación...';
            
            // Redirigir con parámetros únicos
            const timestamp = Date.now();
            const random = Math.random().toString(36).substring(7);
            
            setTimeout(() => {
                window.location.replace(`https://finangest-k51fwsg7q-felirozxxs-projects.vercel.app/app-working.html?t=${timestamp}&r=${random}`);
            }, 1000);
        }
        
        clearEverything().catch(err => {
            console.error('Error:', err);
            status.textContent = 'Error limpiando cache, redirigiendo...';
            setTimeout(() => {
                window.location.replace('https://finangest-k51fwsg7q-felirozxxs-projects.vercel.app/app-working.html');
            }, 2000);
        });
    </script>
</body>
</html>
