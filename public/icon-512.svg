    <path d="M65 40 L200 40" stroke="url(#accentGrad512)" stroke-width="32" fill="none" stroke-linecap="round"/>
    <path d="M65 145 L160 145" stroke="url(#accentGrad512)" stroke-width="26" fill="none" stroke-linecap="round"/>
    <path d="M130 255 L185 200 L240 225 L295 120" stroke="#00f5d4" stroke-width="16" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="295" cy="120" r="16" fill="#00f5d4"/>
