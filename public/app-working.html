<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanGest - Gestión Financiera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a1f2e;
            --accent-cyan: #00d4ff;
            --text-primary: #ffffff;
            --text-secondary: #8892b0;
            --border-color: #2d3548;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card-dark {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }
        .form-control-dark {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 8px;
        }
        .form-control-dark:focus {
            background: var(--bg-secondary);
            border-color: var(--accent-cyan);
            color: var(--text-primary);
            outline: none;
        }
        .modal-dark .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }
        .modal-dark .modal-header {
            border-bottom: 1px solid var(--border-color);
        }
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            margin: 5px;
            display: inline-block;
        }
        .color-option.selected {
            border-color: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-chart-line me-2"></i>FinanGest</h1>
        
        <!-- Login Section -->
        <div id="loginSection" class="card-dark">
            <h2>Iniciar Sesión</h2>
            <div class="mb-3">
                <label class="form-label">Email o Usuario</label>
                <input type="text" id="loginEmail" class="form-control form-control-dark" placeholder="tu@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="loginPassword" class="form-control form-control-dark" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()" class="btn btn-primary-custom">
                <i class="fas fa-sign-in-alt me-2"></i>Entrar
            </button>
            <div id="loginMessage" class="mt-3"></div>
        </div>

        <!-- Main App -->
        <div id="mainApp" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Dashboard</h2>
                <div>
                    <button onclick="showCreateCarteraModal()" class="btn btn-primary-custom">
                        <i class="fas fa-plus me-2"></i>Nueva Cartera
                    </button>
                    <button onclick="logout()" class="btn btn-outline-secondary ms-2">
                        <i class="fas fa-sign-out-alt me-2"></i>Salir
                    </button>
                </div>
            </div>

            <!-- Carteras -->
            <div class="card-dark">
                <h3>Mis Carteras</h3>
                <div id="carterasList">
                    <p class="text-secondary">Cargando carteras...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Nueva Cartera -->
    <div class="modal fade modal-dark" id="carteraModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nueva Cartera</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la Cartera</label>
                        <input type="text" id="carteraNombre" class="form-control form-control-dark" placeholder="Mi cartera">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción (opcional)</label>
                        <textarea id="carteraDescripcion" class="form-control form-control-dark" rows="3" placeholder="Descripción de la cartera"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Color</label>
                        <div>
                            <span class="color-option" style="background: #00d4ff;" onclick="selectColor('#00d4ff')" data-color="#00d4ff"></span>
                            <span class="color-option" style="background: #2ecc71;" onclick="selectColor('#2ecc71')" data-color="#2ecc71"></span>
                            <span class="color-option" style="background: #e6a700;" onclick="selectColor('#e6a700')" data-color="#e6a700"></span>
                            <span class="color-option" style="background: #ff4757;" onclick="selectColor('#ff4757')" data-color="#ff4757"></span>
                            <span class="color-option" style="background: #a855f7;" onclick="selectColor('#a855f7')" data-color="#a855f7"></span>
                        </div>
                        <input type="hidden" id="carteraColor" value="#00d4ff">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary-custom" onclick="createCartera()">Crear Cartera</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = window.location.origin;
        let currentUser = null;

        // Login
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const messageDiv = document.getElementById('loginMessage');

            if (!email || !password) {
                messageDiv.innerHTML = '<div class="alert alert-danger">Por favor completa todos los campos</div>';
                return;
            }

            messageDiv.innerHTML = '<div class="alert alert-info">Iniciando sesión...</div>';

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success && data.user) {
                    currentUser = data.user;
                    messageDiv.innerHTML = '<div class="alert alert-success">¡Bienvenido!</div>';
                    showMainApp();
                } else {
                    messageDiv.innerHTML = `<div class="alert alert-danger">${data.error || 'Error al iniciar sesión'}</div>`;
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="alert alert-danger">Error de conexión</div>';
                console.error('Login error:', error);
            }
        }

        // Mostrar app principal
        function showMainApp() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadCarteras();
        }

        // Cargar carteras
        async function loadCarteras() {
            const carterasDiv = document.getElementById('carterasList');
            carterasDiv.innerHTML = '<p class="text-secondary">Cargando carteras...</p>';

            try {
                const response = await fetch(`${API_URL}/api/carteras?userId=${currentUser.id}`);
                const data = await response.json();

                if (data.success && data.carteras) {
                    if (data.carteras.length === 0) {
                        carterasDiv.innerHTML = '<p class="text-secondary">No tienes carteras aún. ¡Crea tu primera cartera!</p>';
                    } else {
                        let html = '<div class="row">';
                        data.carteras.forEach(cartera => {
                            html += `
                                <div class="col-md-4 mb-3">
                                    <div class="card" style="background: ${cartera.color || '#00d4ff'}20; border: 1px solid ${cartera.color || '#00d4ff'};">
                                        <div class="card-body">
                                            <h5 class="card-title">${cartera.nombre}</h5>
                                            <p class="card-text">${cartera.descripcion || 'Sin descripción'}</p>
                                            <small class="text-muted">Creada: ${new Date(cartera.fechaCreacion).toLocaleDateString()}</small>
                                        </div>
                                    </div>
                                </div>
                            `;
                        });
                        html += '</div>';
                        carterasDiv.innerHTML = html;
                    }
                } else {
                    carterasDiv.innerHTML = '<div class="alert alert-warning">Error al cargar carteras</div>';
                }
            } catch (error) {
                carterasDiv.innerHTML = '<div class="alert alert-danger">Error de conexión al cargar carteras</div>';
                console.error('Error loading carteras:', error);
            }
        }

        // Mostrar modal crear cartera
        function showCreateCarteraModal() {
            document.getElementById('carteraNombre').value = '';
            document.getElementById('carteraDescripcion').value = '';
            selectColor('#00d4ff');
            new bootstrap.Modal(document.getElementById('carteraModal')).show();
        }

        // Seleccionar color
        function selectColor(color) {
            document.querySelectorAll('.color-option').forEach(el => el.classList.remove('selected'));
            document.querySelector(`[data-color="${color}"]`).classList.add('selected');
            document.getElementById('carteraColor').value = color;
        }

        // Crear cartera
        async function createCartera() {
            const nombre = document.getElementById('carteraNombre').value.trim();
            const descripcion = document.getElementById('carteraDescripcion').value.trim();
            const color = document.getElementById('carteraColor').value;

            if (!nombre) {
                alert('Por favor ingresa un nombre para la cartera');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/carteras`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser.id,
                        nombre,
                        descripcion,
                        color
                    })
                });

                const data = await response.json();

                if (data.success) {
                    bootstrap.Modal.getInstance(document.getElementById('carteraModal')).hide();
                    loadCarteras();
                    alert('¡Cartera creada exitosamente!');
                } else {
                    alert(`Error: ${data.error || 'No se pudo crear la cartera'}`);
                }
            } catch (error) {
                alert('Error de conexión al crear cartera');
                console.error('Error creating cartera:', error);
            }
        }

        // Logout
        function logout() {
            currentUser = null;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginMessage').innerHTML = '';
        }

        // Inicializar colores
        document.addEventListener('DOMContentLoaded', function() {
            selectColor('#00d4ff');
        });
    </script>
</body>
</html>
