<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>FinanGest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e17 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .login-card {
            background: #1a1f2e;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            border: 1px solid #2d3548;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo i {
            font-size: 3rem;
            color: #00d4ff;
        }
        .logo h1 {
            color: #00d4ff;
            margin-top: 10px;
        }
        .form-control {
            background: #0f1419;
            border: 2px solid #2d3548;
            color: white;
            padding: 12px;
            border-radius: 8px;
        }
        .form-control:focus {
            background: #0f1419;
            border-color: #00d4ff;
            color: white;
            box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            font-size: 16px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
        }
        .alert {
            margin-top: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-chart-line"></i>
            <h1>FinanGest</h1>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email" value="fzuluaga548@gmail.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" value="Pipe16137356" required>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Entrar
            </button>
            <div id="message"></div>
        </form>
    </div>

    <script>
        const API_URL = 'https://finangest.vercel.app';
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            
            msg.innerHTML = '<div class="alert alert-info">Conectando...</div>';
            
            try {
                const res = await fetch(API_URL + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (data.success && data.user) {
                    msg.innerHTML = '<div class="alert alert-success">✅ Login exitoso!</div>';
                    sessionStorage.setItem('finangest_user', JSON.stringify(data.user));
                    setTimeout(() => {
                        window.location.href = '/fg2026.html';
                    }, 500);
                } else {
                    msg.innerHTML = '<div class="alert alert-danger">❌ ' + (data.error || 'Error al iniciar sesión') + '</div>';
                }
            } catch (error) {
                msg.innerHTML = '<div class="alert alert-danger">❌ Error de conexión</div>';
            }
        });
    </script>
</body>
</html>
